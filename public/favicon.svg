<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">NovaCent favicon</title>
  <desc id="desc">NovaCent NC monogram favicon.</desc>
  <defs>
    <linearGradient id="brand" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#101720"/>
  <rect x="9" y="9" width="46" height="46" rx="12" fill="url(#brand)"/>
  <text x="32" y="39" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800" letter-spacing="0" fill="#ffffff">NC</text>
</svg>
